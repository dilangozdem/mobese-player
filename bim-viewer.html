<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIM Model Goruntleyici</title>
  <style>
    :root{--bg:#0b0f19;--card:#111827;--border:#1e293b;--accent:#3b82f6;--text:#f1f5f9;--dim:#94a3b8;--muted:#64748b}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .container{display:flex;flex-direction:column;height:100vh}
    .header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
    .bim-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0}
    .header .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim)}
    .header .model-name{font-size:11px;font-weight:600;color:var(--text)}
    .actions{display:flex;gap:5px;margin-left:auto}
    .btn{padding:4px 10px;font-size:10px;font-weight:600;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);cursor:pointer;transition:all 0.15s;text-transform:uppercase}
    .btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .file-wrap{position:relative}
    .file-wrap input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
    .canvas-wrap{flex:1;min-height:0;position:relative;cursor:grab}
    .canvas-wrap:active{cursor:grabbing}
    .canvas-wrap canvas{display:block;width:100%!important;height:100%!important}
    .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(11,15,25,0.88);z-index:5;text-align:center;padding:24px}
    .overlay.hidden{display:none}
    .spinner{width:30px;height:30px;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .overlay-text{font-size:13px;color:var(--dim);line-height:1.6}
    .overlay-text strong{color:var(--text)}
    .overlay-icon{font-size:36px;opacity:0.4}
    .model-btns{display:flex;gap:4px;flex-wrap:wrap}
    .model-btn{padding:3px 8px;font-size:10px;font-weight:600;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--dim);cursor:pointer;transition:all 0.15s}
    .model-btn:hover,.model-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .info-bar{display:flex;align-items:center;gap:12px;padding:6px 14px;background:var(--card);border-top:1px solid var(--border);font-size:10px;color:var(--muted);flex-shrink:0}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="bim-dot"></span>
    <span class="label">BIM Model</span>
    <span class="model-name" id="model-name"></span>
    <div class="actions">
      <div class="model-btns" id="model-btns"></div>
      <div class="file-wrap"><button class="btn">Dosya Yukle</button><input type="file" id="file-input" accept=".glb,.gltf"></div>
      <button class="btn" id="btn-reset">Sifirla</button>
      <button class="btn" id="btn-wireframe">Wireframe</button>
    </div>
  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="overlay" id="loading"><div class="spinner"></div><div class="overlay-text" id="loading-text">Model yukleniyor...</div></div>
    <div class="overlay hidden" id="empty"><div class="overlay-icon">&#x1F3D7;</div><div class="overlay-text"><strong>3D BIM Goruntleyici</strong><br>Model secin veya dosya yukleyin</div></div>
    <div class="overlay hidden" id="error"><div class="overlay-text"><strong>Model yuklenemedi</strong><br><span id="error-detail"></span></div></div>
  </div>
  <div class="info-bar"><span>Sol tik: Dondur</span><span>Scroll: Yakinlastir</span><span>Sag tik: Kaydir</span><span id="poly-count"></span></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
  var defaultModels=[
    {name:'Duck (Test)',url:'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb'},
    {name:'Avocado',url:'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb'},
    {name:'Helmet',url:'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DamagedHelmet/glTF-Binary/DamagedHelmet.glb'}
  ];
  var params=new URLSearchParams(window.location.search);
  var bimUrl=params.get('bim_url')||params.get('bim')||params.get('url')||'';
  var bimName=params.get('bim_name')||params.get('name')||'';
  var models=bimUrl?[{name:bimName||'BIM Model',url:bimUrl}]:defaultModels;

  var container=document.getElementById('canvas-wrap');
  var scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0b0f19);
  var camera=new THREE.PerspectiveCamera(50,container.clientWidth/container.clientHeight,0.001,5000);
  camera.position.set(3,3,3);
  var renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(container.clientWidth,container.clientHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.3;
  container.appendChild(renderer.domElement);
  var controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.08;
  scene.add(new THREE.AmbientLight(0xffffff,0.7));
  var dirLight=new THREE.DirectionalLight(0xffffff,1.0);dirLight.position.set(20,30,10);scene.add(dirLight);
  scene.add(new THREE.HemisphereLight(0xb1e1ff,0xb97a20,0.4));
  scene.add(new THREE.GridHelper(50,50,0x1e293b,0x111827));
  new ResizeObserver(function(){var w=container.clientWidth,h=container.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h)}).observe(container);
  (function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)})();

  var btnsEl=document.getElementById('model-btns');
  models.forEach(function(m,i){var btn=document.createElement('button');btn.className='model-btn';btn.textContent=m.name;btn.addEventListener('click',function(){loadModel(m.url,m.name,i)});btnsEl.appendChild(btn)});
  document.getElementById('file-input').addEventListener('change',function(e){if(e.target.files.length)loadFile(e.target.files[0])});
  document.getElementById('btn-reset').addEventListener('click',function(){camera.position.set(3,3,3);controls.target.set(0,0,0);controls.update()});
  var wf=false;document.getElementById('btn-wireframe').addEventListener('click',function(){wf=!wf;this.style.background=wf?'var(--accent)':'';
    this.style.color=wf?'#fff':'';
    scene.traverse(function(c){if(c.isMesh&&c.material){if(Array.isArray(c.material))c.material.forEach(function(m){m.wireframe=wf});else c.material.wireframe=wf}})});

  loadModel(models[0].url,models[0].name,0);

  var currentModel=null,gltfLoaderReady=false,gltfQueue=[];
  function ensureGLTF(cb){if(gltfLoaderReady)return cb();gltfQueue.push(cb);if(gltfQueue.length===1){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';s.onload=function(){gltfLoaderReady=true;gltfQueue.forEach(function(fn){fn()});gltfQueue=[]};document.head.appendChild(s)}}

  function loadModel(url,name,idx){
    document.getElementById('model-name').textContent=name;
    btnsEl.querySelectorAll('.model-btn').forEach(function(b,i){b.classList.toggle('active',i===idx)});
    show('loading');hide('error');hide('empty');
    document.getElementById('loading-text').textContent='Model indiriliyor...';
    ensureGLTF(function(){
      var loader=new THREE.GLTFLoader();
      loader.load(url,function(gltf){
        if(currentModel){scene.remove(currentModel)}
        currentModel=gltf.scene;scene.add(gltf.scene);fitCamera(gltf.scene);hide('loading');
        var tris=0;gltf.scene.traverse(function(c){if(c.isMesh&&c.geometry){var g=c.geometry;if(g.index)tris+=g.index.count/3;else if(g.attributes.position)tris+=g.attributes.position.count/3}});
        document.getElementById('poly-count').textContent=Math.round(tris)+' ucgen';
      },function(xhr){if(xhr.total>0)document.getElementById('loading-text').textContent='Indiriliyor... %'+Math.round(xhr.loaded/xhr.total*100)},
      function(err){hide('loading');document.getElementById('error-detail').textContent=err.message||'Hata';show('error')});
    });
  }
  function loadFile(file){
    document.getElementById('model-name').textContent=file.name;
    show('loading');hide('error');hide('empty');
    var url=URL.createObjectURL(file);
    ensureGLTF(function(){
      var loader=new THREE.GLTFLoader();
      loader.load(url,function(gltf){if(currentModel)scene.remove(currentModel);currentModel=gltf.scene;scene.add(gltf.scene);fitCamera(gltf.scene);hide('loading')},null,
      function(err){hide('loading');document.getElementById('error-detail').textContent=err.message||'Hata';show('error')});
    });
  }
  function fitCamera(obj){var box=new THREE.Box3().setFromObject(obj);var center=box.getCenter(new THREE.Vector3());var size=box.getSize(new THREE.Vector3());var d=Math.max(size.x,size.y,size.z)/(2*Math.tan(camera.fov*Math.PI/360))*1.5;camera.position.copy(center);camera.position.x+=d*0.7;camera.position.y+=d*0.5;camera.position.z+=d*0.7;camera.lookAt(center);controls.target.copy(center);controls.update()}
  function show(id){document.getElementById(id).classList.remove('hidden')}
  function hide(id){document.getElementById(id).classList.add('hidden')}
})();
</script>
</body>
</html>
